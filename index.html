<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYC Snow Map — Winter 2025–26</title>
<link href="https://unpkg.com/maplibre-gl@4.1.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.1.1/dist/maplibre-gl.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--bg-panel:rgba(244,241,237,0.92);--bg-card:#fff;--text-primary:#1A1A1A;--text-secondary:#5C5C5C;--text-muted:#8A8A8A;--accent:#2B5EA7;--accent-subtle:rgba(43,94,167,0.08);--border:rgba(0,0,0,0.08);--border-strong:rgba(0,0,0,0.15);--snow-heavy:#1B3A6B;--snow-mid:#4A7FCA;--snow-light:#A8C8F0;--snow-trace:#D6E5F5;--shadow-md:0 4px 16px rgba(0,0,0,0.1);--shadow-lg:0 8px 30px rgba(0,0,0,0.12);--radius:10px;--font-display:'Playfair Display',Georgia,serif;--font-body:'DM Sans',-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);font-size:14px;line-height:1.5;color:var(--text-primary);overflow:hidden;height:100vh}
#map{position:fixed;inset:0;z-index:0}
.maplibregl-ctrl-attrib{display:none!important}
.maplibregl-ctrl-top-left{top:80px!important;left:16px!important}
#snowCanvas{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.3}
.header{position:fixed;top:0;left:0;right:0;z-index:50;background:var(--bg-panel);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:baseline;gap:12px}
.header-title{font-family:var(--font-display);font-size:22px;font-weight:900;letter-spacing:-.5px}
.header-title span{color:var(--accent)}
.header-subtitle{font-size:12px;font-weight:300;color:var(--text-secondary);letter-spacing:.5px}
.header-stats{display:flex;gap:28px}
.stat-item{text-align:right}
.stat-value{font-family:var(--font-display);font-size:20px;font-weight:700;line-height:1.1}
.stat-label{font-size:9px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.panel{position:fixed;z-index:20;background:var(--bg-panel);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);overflow:hidden}
.panel-title{font-family:var(--font-display);font-size:13px;font-weight:700;padding:12px 16px 8px;border-bottom:2px solid var(--accent);letter-spacing:-.2px}
.panel-body{padding:12px 16px 16px}
.panel-storms{top:70px;left:16px;width:260px;max-height:calc(100vh - 90px);overflow-y:auto}
.panel-storms::-webkit-scrollbar{width:3px}
.panel-storms::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
.storms-grid{display:flex;flex-direction:column;gap:6px}
.storm-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:space-between}
.storm-card:hover{border-color:var(--accent);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.storm-card.active{border-color:var(--accent);background:var(--accent-subtle);box-shadow:0 0 0 1px var(--accent)}
.storm-info{flex:1}
.storm-date{font-weight:700;font-size:13px}
.storm-detail{font-size:10px;color:var(--text-muted);margin-top:1px}
.storm-amount{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--accent);line-height:1}
.storm-unit{font-family:var(--font-body);font-size:9px;font-weight:500;color:var(--text-muted)}
.storm-card-seasonal{background:linear-gradient(135deg,var(--accent),#1B3A6B);border:none}
.storm-card-seasonal .storm-date,.storm-card-seasonal .storm-detail{color:rgba(255,255,255,.85)}
.storm-card-seasonal .storm-amount{color:#fff}
.storm-card-seasonal .storm-unit{color:rgba(255,255,255,.7)}
.storm-card-seasonal.active{box-shadow:0 0 0 2px #fff,0 0 0 4px var(--accent)}
.panel-stats{top:70px;right:16px;width:300px;max-height:calc(100vh - 90px);overflow-y:auto}
.panel-stats::-webkit-scrollbar{width:3px}
.panel-stats::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
.stats-section{margin-bottom:16px}
.stats-section:last-child{margin-bottom:0}
.stats-section-title{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.borough-bars{display:flex;flex-direction:column;gap:5px}
.borough-row{display:flex;align-items:center;gap:8px}
.borough-name{width:80px;font-size:11px;font-weight:500;color:var(--text-secondary);text-align:right;flex-shrink:0}
.borough-bar-wrap{flex:1;height:18px;background:rgba(0,0,0,.04);border-radius:3px;overflow:hidden}
.borough-bar{height:100%;background:linear-gradient(90deg,var(--snow-light),var(--accent));border-radius:3px;transition:width .8s cubic-bezier(.25,.46,.45,.94);min-width:2px}
.borough-val{width:38px;font-size:11px;font-weight:700;text-align:left;flex-shrink:0}
.chart-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:12px}
.chart-canvas-wrap{width:100%;height:130px;position:relative}
.chart-canvas-wrap canvas{width:100%;height:100%}
.chart-legend{display:flex;gap:12px;margin-top:6px;font-size:9px;color:var(--text-muted)}
.chart-legend-item{display:flex;align-items:center;gap:3px}
.chart-legend-dot{width:7px;height:7px;border-radius:2px}
.compare-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.compare-row:last-child{border-bottom:none}
.compare-metric{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;flex:1}
.compare-city{width:60px;text-align:center;font-size:13px;font-weight:700}
.compare-city.nyc{color:var(--accent)}
.compare-city.bos{color:#C0392B}
.compare-header{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding-bottom:2px}
.compare-link{display:block;text-align:center;margin-top:10px;padding:7px;background:var(--accent-subtle);border-radius:6px;color:var(--accent);font-size:11px;font-weight:500;text-decoration:none;transition:background .2s}
.compare-link:hover{background:rgba(43,94,167,.15)}
.map-legend{position:fixed;bottom:24px;left:16px;background:var(--bg-panel);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;box-shadow:var(--shadow-md);z-index:20}
.legend-title{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:6px}
.legend-bar{width:160px;height:8px;border-radius:3px;background:linear-gradient(90deg,var(--snow-trace),var(--snow-light),var(--snow-mid),var(--snow-heavy))}
.legend-labels{display:flex;justify-content:space-between;margin-top:3px;font-size:9px;color:var(--text-muted)}
.map-tooltip{position:fixed;pointer-events:none;background:var(--bg-card);border:1px solid var(--border-strong);border-radius:8px;padding:10px 14px;box-shadow:var(--shadow-lg);font-size:13px;z-index:60;max-width:220px;opacity:0;transition:opacity .12s}
.map-tooltip.visible{opacity:1}
.tooltip-name{font-weight:700;font-size:14px;margin-bottom:1px}
.tooltip-boro{font-size:10px;color:var(--text-muted);margin-bottom:5px}
.tooltip-snow{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--accent)}
.tooltip-snow-label{font-size:9px;color:var(--text-muted)}
.loading-overlay{position:fixed;inset:0;background:#E6E2DD;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:999;transition:opacity .6s}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-text{font-family:var(--font-display);font-size:26px;font-weight:900}
.loading-text span{color:var(--accent)}
.loading-sub{font-size:13px;color:var(--text-muted)}
.loading-spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){.panel-stats{display:none}.panel-storms{width:220px}.header-stats{display:none}}
@media(max-width:600px){.panel-storms{top:auto;bottom:0;left:0;right:0;width:100%;max-height:40vh;border-radius:var(--radius) var(--radius) 0 0}.map-legend{bottom:auto;top:70px;left:50%;transform:translateX(-50%)}}
</style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">NYC <span>Snow Map</span></div>
  <div class="loading-sub">Loading neighborhood data…</div>
</div>
<div id="map"></div>
<canvas id="snowCanvas"></canvas>
<div class="map-tooltip" id="tooltip"></div>
<header class="header">
  <div class="header-left">
    <div class="header-title">NYC <span>Snow Map</span></div>
    <div class="header-subtitle">Winter 2025–26</div>
  </div>
  <div class="header-stats" id="headerStats"></div>
</header>
<div class="panel panel-storms">
  <div class="panel-title">Storms</div>
  <div class="panel-body"><div class="storms-grid" id="stormsGrid"></div></div>
</div>
<div class="panel panel-stats">
  <div class="panel-title">Stats & History</div>
  <div class="panel-body">
    <div class="stats-section">
      <div class="stats-section-title">Borough Breakdown</div>
      <div class="borough-bars" id="boroughBars"></div>
    </div>
    <div class="stats-section">
      <div class="stats-section-title">Historical Snowfall (88 winters)</div>
      <div class="chart-wrap">
        <div class="chart-canvas-wrap"><canvas id="histChart"></canvas></div>
        <div class="chart-legend">
          <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--accent)"></div>2025–26</div>
          <div class="chart-legend-item"><div class="chart-legend-dot" style="background:rgba(0,0,0,.12)"></div>Other</div>
          <div class="chart-legend-item"><div class="chart-legend-dot" style="background:var(--text-muted);height:1px;width:10px;border-radius:0"></div>Avg</div>
        </div>
      </div>
    </div>
    <div class="stats-section">
      <div class="stats-section-title">vs Boston</div>
      <div class="compare-row">
        <div class="compare-metric"></div>
        <div class="compare-city compare-header" style="color:var(--accent)">NYC</div>
        <div class="compare-city compare-header" style="color:#C0392B">BOS</div>
      </div>
      <div id="compareRows"></div>
      <a class="compare-link" href="https://mekhalraj.github.io/boston-snow-map" target="_blank">Explore Boston Snow Map →</a>
    </div>
  </div>
</div>
<div class="map-legend">
  <div class="legend-title">Seasonal Snowfall</div>
  <div class="legend-bar"></div>
  <div class="legend-labels"><span>5"</span><span>25"</span><span>40"</span><span>55"</span></div>
</div>

<script>
const DATA_BASE='.';
const BOSTON_DATA_URL='https://mekhalraj.github.io/boston-snow-map';
let neighborhoodsData=null,boroughsData=null,stormsData=null,historicalData=null,bostonHistorical=null,activeStorm='seasonal',map=null;

async function loadData(){
  try{
    const[a,b,c,d]=await Promise.all([
      fetch(`${DATA_BASE}/nyc_neighborhoods.geojson`),fetch(`${DATA_BASE}/nyc_boroughs.geojson`),
      fetch(`${DATA_BASE}/nyc_storms.json`),fetch(`${DATA_BASE}/nyc_historical.json`)
    ]);
    neighborhoodsData=await a.json();boroughsData=await b.json();
    stormsData=await c.json();historicalData=await d.json();
    try{const r=await fetch(`${BOSTON_DATA_URL}/data/boston_historical.json`);if(r.ok)bostonHistorical=await r.json();}catch(e){}
    return true;
  }catch(e){console.error('Data load error:',e);return false;}
}

function initMap(){
  map=new maplibregl.Map({
    container:'map',
    style:'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
    center:[-73.95,40.71],zoom:10.2,minZoom:9,maxZoom:15,pitch:0
  });
  map.addControl(new maplibregl.NavigationControl({showCompass:false}),'top-left');
  map.on('load',()=>{
    map.addSource('neighborhoods',{type:'geojson',data:neighborhoodsData});
    map.addLayer({id:'neighborhoods-fill',type:'fill',source:'neighborhoods',paint:{
      'fill-color':buildColorExpr('snow_seasonal'),
      'fill-opacity':['interpolate',['linear'],['zoom'],9.5,0,10.5,0.75]
    }});
    map.addLayer({id:'neighborhoods-line',type:'line',source:'neighborhoods',paint:{
      'line-color':'rgba(255,255,255,0.5)',
      'line-width':['interpolate',['linear'],['zoom'],10,0.2,13,0.8],
      'line-opacity':['interpolate',['linear'],['zoom'],9.5,0,10.5,1]
    }});
    map.addSource('boroughs',{type:'geojson',data:boroughsData});
    map.addLayer({id:'boroughs-fill',type:'fill',source:'boroughs',paint:{
      'fill-color':buildBoroughColorExpr('snow_seasonal_mean'),
      'fill-opacity':['interpolate',['linear'],['zoom'],9.5,0.7,10.5,0]
    }});
    map.addLayer({id:'boroughs-line',type:'line',source:'boroughs',paint:{'line-color':'rgba(0,0,0,0.2)','line-width':2}});
    map.addLayer({id:'boroughs-labels',type:'symbol',source:'boroughs',layout:{
      'text-field':['get','borough_name'],
      'text-font':['Open Sans Bold','Arial Unicode MS Bold'],
      'text-size':['interpolate',['linear'],['zoom'],9,12,12,15],
      'text-transform':'uppercase','text-letter-spacing':0.08
    },paint:{'text-color':'#1A1A1A','text-halo-color':'rgba(244,241,237,0.85)','text-halo-width':2}});
    setupHover();hideLoading();
  });
}

function buildColorExpr(p){return['interpolate',['linear'],['coalesce',['get',p],0],5,'#D6E5F5',15,'#A8C8F0',25,'#6BA3E0',35,'#4A7FCA',45,'#2B5EA7',55,'#1B3A6B'];}
function buildBoroughColorExpr(p){return['interpolate',['linear'],['coalesce',['get',p],0],15,'#D6E5F5',25,'#A8C8F0',35,'#6BA3E0',45,'#2B5EA7'];}

function updateMapForStorm(id){
  if(!map||!map.isStyleLoaded())return;
  let np=id==='seasonal'?'snow_seasonal':`snow_${id}`;
  let bp=id==='seasonal'?'snow_seasonal_mean':`snow_${id}_mean`;
  map.setPaintProperty('neighborhoods-fill','fill-color',buildColorExpr(np));
  if(boroughsData.features[0].properties[bp]!==undefined)
    map.setPaintProperty('boroughs-fill','fill-color',buildBoroughColorExpr(bp));
  renderBoroughBars(id);
}

function setupHover(){
  const tt=document.getElementById('tooltip');
  map.on('mousemove',(e)=>{
    const bbox=[[e.point.x-5,e.point.y-5],[e.point.x+5,e.point.y+5]];
    let f=map.queryRenderedFeatures(bbox,{layers:['neighborhoods-fill']});
    if(!f.length){
      f=map.queryRenderedFeatures(bbox,{layers:['boroughs-fill']});
      if(f.length){
        const p=f[0].properties,sp=activeStorm==='seasonal'?'snow_seasonal_mean':`snow_${activeStorm}_mean`;
        tt.innerHTML=`<div class="tooltip-name">${p.borough_name}</div><div class="tooltip-snow">${p[sp]?p[sp].toFixed(1):'—'}<span class="tooltip-snow-label"> in</span></div><div class="tooltip-snow-label">${activeStorm==='seasonal'?'Season Avg':'Storm Avg'}</div>`;
        tt.classList.add('visible');tt.style.left=(e.point.x+15)+'px';tt.style.top=(e.point.y-10)+'px';
        map.getCanvas().style.cursor='pointer';return;
      }
    }
    if(f.length){
      const p=f[0].properties,nm=p.NTAName||'Unknown',bo=p.BoroName||'',sp=activeStorm==='seasonal'?'snow_seasonal':`snow_${activeStorm}`;
      tt.innerHTML=`<div class="tooltip-name">${nm}</div><div class="tooltip-boro">${bo}</div><div class="tooltip-snow">${p[sp]?parseFloat(p[sp]).toFixed(1):'—'}<span class="tooltip-snow-label"> in</span></div><div class="tooltip-snow-label">${activeStorm==='seasonal'?'Season Total':'Storm Total'}</div>`;
      tt.classList.add('visible');tt.style.left=(e.point.x+15)+'px';tt.style.top=(e.point.y-10)+'px';
      map.getCanvas().style.cursor='pointer';
    }else{tt.classList.remove('visible');map.getCanvas().style.cursor='';}
  });
  map.on('mouseleave','neighborhoods-fill',()=>{tt.classList.remove('visible');map.getCanvas().style.cursor='';});
}

function renderHeaderStats(){
  const el=document.getElementById('headerStats'),cur=historicalData.years.find(y=>y.is_current);
  el.innerHTML=`
    <div class="stat-item"><div class="stat-value">${stormsData.season_total_in}"</div><div class="stat-label">Season Total</div></div>
    <div class="stat-item"><div class="stat-value">#${cur?cur.rank:'—'}</div><div class="stat-label">All-Time Rank</div></div>
    <div class="stat-item"><div class="stat-value">${stormsData.storms.length}</div><div class="stat-label">Storms</div></div>
    <div class="stat-item"><div class="stat-value">${neighborhoodsData.features.length}</div><div class="stat-label">Neighborhoods</div></div>`;
}

function renderStormCards(){
  const g=document.getElementById('stormsGrid');
  let h=`<div class="storm-card storm-card-seasonal ${activeStorm==='seasonal'?'active':''}" onclick="selectStorm('seasonal')">
    <div class="storm-info"><div class="storm-date">Full Season</div><div class="storm-detail">Oct 2025 – Mar 2026</div></div>
    <div><div class="storm-amount">${stormsData.season_total_in}<span class="storm-unit"> in</span></div></div></div>`;
  for(const s of stormsData.storms){
    h+=`<div class="storm-card ${activeStorm===s.id?'active':''}" onclick="selectStorm('${s.id}')">
      <div class="storm-info"><div class="storm-date">${s.label}</div><div class="storm-detail">Peak: ${s.peak_snow_in}" · ${s.n_days} day${s.n_days>1?'s':''}</div></div>
      <div><div class="storm-amount">${s.avg_snow_in}<span class="storm-unit"> in</span></div></div></div>`;
  }
  g.innerHTML=h;
}
function selectStorm(id){activeStorm=id;renderStormCards();updateMapForStorm(id);}

function renderBoroughBars(stormId){
  const c=document.getElementById('boroughBars'),bs=boroughsData.features.map(f=>f.properties);
  const p=(!stormId||stormId==='seasonal')?'snow_seasonal_mean':`snow_${stormId}_mean`;
  const mx=Math.max(...bs.map(b=>b[p]||0)),sorted=[...bs].sort((a,b)=>(b[p]||0)-(a[p]||0));
  c.innerHTML=sorted.map(b=>{
    const v=b[p]||0,pct=mx>0?(v/mx*100):0;
    return`<div class="borough-row"><div class="borough-name">${b.borough_name}</div><div class="borough-bar-wrap"><div class="borough-bar" style="width:${pct}%"></div></div><div class="borough-val">${v.toFixed(1)}"</div></div>`;
  }).join('');
}

function renderHistoricalChart(){
  const canvas=document.getElementById('histChart'),ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1,rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  canvas.style.width=rect.width+'px';canvas.style.height=rect.height+'px';ctx.scale(dpr,dpr);
  const W=rect.width,H=rect.height,pad={top:8,right:8,bottom:20,left:28};
  const plotW=W-pad.left-pad.right,plotH=H-pad.top-pad.bottom;
  const yrs=historicalData.years,mx=Math.max(...yrs.map(y=>y.snow_in))*1.05;
  const bw=Math.max(1,plotW/yrs.length-.5);
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='rgba(0,0,0,0.05)';ctx.lineWidth=1;
  for(let v=0;v<=mx;v+=20){const y=pad.top+plotH-(v/mx*plotH);ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();ctx.fillStyle='#8A8A8A';ctx.font='8px DM Sans';ctx.textAlign='right';ctx.fillText(v+'"',pad.left-3,y+3);}
  yrs.forEach((yr,i)=>{const x=pad.left+(i/yrs.length)*plotW,h=(yr.snow_in/mx)*plotH,y=pad.top+plotH-h;ctx.fillStyle=yr.is_current?'#2B5EA7':'rgba(0,0,0,0.1)';ctx.fillRect(x,y,bw,h);});
  const avgY=pad.top+plotH-(historicalData.mean_snow/mx*plotH);
  ctx.strokeStyle='#8A8A8A';ctx.lineWidth=1;ctx.setLineDash([3,2]);ctx.beginPath();ctx.moveTo(pad.left,avgY);ctx.lineTo(W-pad.right,avgY);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#8A8A8A';ctx.font='8px DM Sans';ctx.textAlign='left';ctx.fillText(`avg ${historicalData.mean_snow}"`,W-pad.right-45,avgY-3);
  ctx.fillStyle='#8A8A8A';ctx.font='8px DM Sans';ctx.textAlign='center';
  yrs.forEach((yr,i)=>{if(yr.start_year%10===0){const x=pad.left+(i/yrs.length)*plotW+bw/2;ctx.fillText(yr.start_year,x,H-3);}});
}

function renderCompareWidget(){
  const c=document.getElementById('compareRows'),cur=historicalData.years.find(y=>y.is_current);
  let bt='62.5"',br='#10',ba='42.5"';
  if(bostonHistorical){const bc=bostonHistorical.years.find(y=>y.is_current);if(bc){bt=bc.snow_in+'"';br='#'+bc.rank;}ba=bostonHistorical.mean_snow+'"';}
  const rows=[
    {m:'Season Total',n:stormsData.season_total_in+'"',b:bt},
    {m:'Historical Avg',n:historicalData.mean_snow+'"',b:ba},
    {m:'All-Time Rank',n:cur?'#'+cur.rank:'—',b:br},
    {m:'Storms',n:stormsData.storms.length,b:'7'},
    {m:'Neighborhoods',n:neighborhoodsData.features.length,b:'23'}
  ];
  c.innerHTML=rows.map(r=>`<div class="compare-row"><div class="compare-metric">${r.m}</div><div class="compare-city nyc">${r.n}</div><div class="compare-city bos">${r.b}</div></div>`).join('');
}

function initSnow(){
  const cv=document.getElementById('snowCanvas'),ctx=cv.getContext('2d'),fl=[];
  function rs(){cv.width=innerWidth;cv.height=innerHeight;}rs();addEventListener('resize',rs);
  for(let i=0;i<100;i++)fl.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*2.2+.4,vx:Math.random()*.3-.15,vy:Math.random()*.7+.25,o:Math.random()*.35+.15});
  (function draw(){ctx.clearRect(0,0,cv.width,cv.height);for(const f of fl){ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);ctx.fillStyle=`rgba(90,130,180,${f.o})`;ctx.fill();f.x+=f.vx+Math.sin(f.y*.008)*.25;f.y+=f.vy;if(f.y>cv.height+5){f.y=-5;f.x=Math.random()*cv.width;}if(f.x>cv.width+5)f.x=-5;if(f.x<-5)f.x=cv.width+5;}requestAnimationFrame(draw);})();
}

function hideLoading(){setTimeout(()=>document.getElementById('loadingOverlay').classList.add('hidden'),500);}

async function init(){
  const ok=await loadData();
  if(!ok){document.querySelector('.loading-sub').textContent='Error loading data.';return;}
  renderHeaderStats();renderStormCards();renderBoroughBars('seasonal');renderCompareWidget();
  initMap();initSnow();
  setTimeout(renderHistoricalChart,600);addEventListener('resize',renderHistoricalChart);
}
init();
</script>
